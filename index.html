<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Needle — Coming Soon</title>
<style>
/* Reset & body */
body {
  margin: 0;
  font-family: Arial, Helvetica, sans-serif;
  color: white;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  background: linear-gradient(135deg, #0f172a, #020617);
}

/* Hero section with background image */
.hero {
  width: 100%;
  height: 100%;
  background-image: url("hero.jpg"); /* Replace with your image */
  background-size: cover;
  background-position: center;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* Container for content */
.container {
  background: rgba(0, 0, 0, 0.6); /* Slight overlay for readability */
  padding: 40px 20px;
  border-radius: 12px;
  max-width: 600px;
  box-shadow: 0 0 20px rgba(0,0,0,0.5);
}

/* Heading */
h1 {
  font-size: 60px;
  margin-bottom: 10px;
  letter-spacing: 2px;
}

/* Tagline */
.tagline {
  font-size: 24px;
  opacity: 0.9;
  margin-bottom: 20px;
}

/* Divider */
.divider {
  width: 60px;
  height: 4px;
  background: #3b82f6;
  margin: 25px auto;
  border-radius: 2px;
}

/* Paragraph */
p {
  font-size: 20px;
  opacity: 0.8;
  margin: 10px 0;
}

/* Loader animation */
.loader {
  margin: 30px auto;
  border: 4px solid rgba(255,255,255,0.1);
  border-top: 4px solid #3b82f6;
  border-radius: 50%;
  width: 40px;
  height: 40px;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

/* Footer */
.footer {
  margin-top: 30px;
  font-size: 14px;
  opacity: 0.6;
}

/* Responsive adjustments */
@media(max-width: 500px) {
  h1 {
    font-size: 40px;
  }
  .tagline {
    font-size: 18px;
  }
  p {
    font-size: 16px;
  }
}
</style>
</head>
<body>
  <div class="hero">
    <div class="container">
      <h1>The Needle</h1>
      <p class="tagline">Moving the needle in real estate talent</p>
      <div class="divider"></div>
      <p>Our website is currently under construction.</p>
      <div class="loader"></div>
      <p>Launching soon.</p>
      <div class="footer">
        © 2026 The Needle
      </div>
    </div>
  </div>
</body>
</html>
