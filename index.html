<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Needle — Coming Soon</title>
<style>
/* Body with background image */
body {
  margin: 0;
  font-family: Montserrat, sans-serif;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  color: white;
  background: url('needle.jpeg') no-repeat center center/cover;
}

/* Container for content */
.container {
  background: rgba(0,0,0,0.5); /* semi-transparent overlay */
  padding: 30px 20px;
  border-radius: 10px;
  max-width: 600px;
}

/* Heading */
h1 { font-size: 50px; margin-bottom: 10px; }

/* Tagline */
p { font-size: 20px; margin: 5px 0; }

/* Loader animation */
.loader {
  margin: 20px auto;
  border: 4px solid rgba(255,255,255,0.1);
  border-top: 4px solid #3b82f6;
  border-radius: 50%;
  width: 40px;
  height: 40px;
  animation: spin 1s linear infinite;
}
@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}
</style>
</head>
<body>
  <div class="container">
    <p>Website Under Construction</p>
    <p>We’re building something amazing! Stay tuned.</p>

</div>
  </div>
</body>
</html>
